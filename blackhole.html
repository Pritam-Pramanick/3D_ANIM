<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Fidelity Black Hole Simulation</title>
    <style>
        /* Excellent, minimal CSS styling to ensure a full-screen, immersive experience */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 100, 0, 0.8);
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>Singularity Engine</h2>
        <p>Left Click + Drag to Rotate | Scroll to Zoom</p>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Antialias off for performance with heavy post-processing
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 100;
        controls.minDistance = 5;

        // 2. The Event Horizon (Pure Black Sphere)
        const blackHoleGeometry = new THREE.SphereGeometry(4, 64, 64);
        const blackHoleMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const blackHole = new THREE.Mesh(blackHoleGeometry, blackHoleMaterial);
        scene.add(blackHole);

        // 3. The Accretion Disk (High GPU Load Particle System)
        const particleCount = 150000; // Pushing the GPU
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);

        const colorInside = new THREE.Color(0xffffff); // White-hot inner edge
        const colorMiddle = new THREE.Color(0xff5500); // Orange/Red middle
        const colorOutside = new THREE.Color(0x220000); // Dark red outer edge

        for (let i = 0; i < particleCount; i++) {
            // Distribute particles in a disk shape
            const radius = 4.2 + Math.random() * 15; // Inner radius just outside event horizon
            const theta = Math.random() * Math.PI * 2;
            
            // Taper the thickness of the disk
            const thickness = (Math.random() - 0.5) * (20 / radius); 

            positions[i * 3] = Math.cos(theta) * radius;
            positions[i * 3 + 1] = thickness;
            positions[i * 3 + 2] = Math.sin(theta) * radius;

            // Determine color based on distance from the center (temperature)
            const mixedColor = new THREE.Color();
            const ratio = (radius - 4.2) / 15;

            if (ratio < 0.3) {
                mixedColor.lerpColors(colorInside, colorMiddle, ratio / 0.3);
            } else {
                mixedColor.lerpColors(colorMiddle, colorOutside, (ratio - 0.3) / 0.7);
            }

            colors[i * 3] = mixedColor.r;
            colors[i * 3 + 1] = mixedColor.g;
            colors[i * 3 + 2] = mixedColor.b;

            // Varying particle sizes
            sizes[i] = Math.random() * 1.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // Custom shader for glowing particles
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.8,
            depthWrite: false
        });

        const accretionDisk = new THREE.Points(geometry, particleMaterial);
        // Tilt the disk slightly for a better default view
        accretionDisk.rotation.x = Math.PI / 8; 
        scene.add(accretionDisk);

        // 4. Post-Processing (Intense Bloom)
        const renderScene = new RenderPass(scene, camera);
        
        // Resolution, strength, radius, threshold
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.5, 0.1);

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // 5. Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // 6. Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Rotate the accretion disk
            // It rotates faster near the center, but for a unified particle system, 
            // we'll apply a global rotation that looks incredibly smooth
            accretionDisk.rotation.y = elapsedTime * -0.5;

            // Make the entire disk wobble slightly
            accretionDisk.rotation.z = Math.sin(elapsedTime * 0.2) * 0.05;

            controls.update();
            
            // Use composer instead of renderer for the post-processing effects
            composer.render();
        }

        animate();
    </script>
</body>
</html>
